    <script>
        const quizData = [
            {
                question: "Manakah tipe data yang digunakan untuk menyimpan angka desimal di Python?",
                options: ["int", "float", "str", "bool"],
                correct: 1
            },
            {
                question: "Simbol apa yang digunakan untuk membuat komentar satu baris di Python?",
                options: ["//", "/*", "#", "--"],
                correct: 2
            },
            {
                question: "Koleksi data mana yang bersifat Immutable (tidak bisa diubah setelah dibuat)?",
                options: ["List", "Dictionary", "Set", "Tuple"],
                correct: 3
            },
            {
                question: "Apa fungsi dari keyword 'lambda' di Python?",
                options: ["Membuat loop", "Membuat fungsi anonim satu baris", "Menghapus variabel", "Menentukan tipe data"],
                correct: 1
            },
            {
                question: "Bagaimana cara menambahkan elemen ke dalam sebuah List?",
                options: ["append()", "add()", "insert_last()", "push()"],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;

        function loadQuestion() {
            const questionEl = document.getElementById('question');
            const optionsEl = document.getElementById('options');
            const resultEl = document.getElementById('quiz-result');
            const nextBtn = document.getElementById('next-btn');

            resultEl.innerText = "";
            nextBtn.style.display = "none";
            optionsEl.innerHTML = "";

            const currentQuestion = quizData[currentQuestionIndex];
            questionEl.innerText = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;

            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => checkAnswer(index);
                optionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            const correctIndex = quizData[currentQuestionIndex].correct;
            const options = document.querySelectorAll('.option-btn');
            const resultEl = document.getElementById('quiz-result');
            const nextBtn = document.getElementById('next-btn');

            options.forEach((btn, index) => {
                btn.disabled = true;
                if (index === correctIndex) {
                    btn.classList.add('correct');
                } else if (index === selectedIndex) {
                    btn.classList.add('wrong');
                }
            });

            if (selectedIndex === correctIndex) {
                resultEl.innerText = "✅ Benar! Bagus sekali.";
                resultEl.style.color = "green";
            } else {
                resultEl.innerText = "❌ Salah! Jawaban yang benar adalah: " + quizData[currentQuestionIndex].options[correctIndex];
                resultEl.style.color = "red";
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                nextBtn.style.display = "block";
            } else {
                resultEl.innerText += " | Kuis Selesai! 🎉";
            }
        }

        window.onload = loadQuestion;
    </script>
